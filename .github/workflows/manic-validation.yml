name: MANIC Validation Gate

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install AJV
        run: npm install ajv

      - name: Execute MANIC Validation
        run: node docs/protocols/manic/validators/validate_all.js
