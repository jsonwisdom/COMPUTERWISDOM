name: Receipt Core

on:
  push:
    branches:
      - receipts-pipeline-v0-1

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m pip install pytest
      - run: python -m pytest signal-core/tests/test_receipt_core.py -q
