name: verify

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - feature/computerwisdom-alms-runtime-runway-v0-1

jobs:
  verify:
    name: verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify COMPUTERWISDOM ALMS replay runway
        shell: bash
        run: |
          set -euo pipefail

          test -f index.html

          DOCTYPE_COUNT="$(grep -c '<!DOCTYPE html>' index.html || true)"
          if [ "$DOCTYPE_COUNT" -ne 1 ]; then
            echo "Expected exactly one <!DOCTYPE html>, found $DOCTYPE_COUNT"
            exit 1
          fi

          grep -q 'Meme Court' index.html
          grep -q 'Goblin Court' index.html
          grep -q 'Clown Court' index.html

          grep -q '3 → JOY' index.html
          grep -q '6 → ENS' index.html
          grep -q '9 → ALMS' index.html

          grep -q 'LOCKED_PENDING_VALIDATOR_PASS' index.html
          grep -q 'missionButton' index.html
          grep -q 'disabled' index.html

          grep -q 'Authority: false' index.html
          grep -q 'Membrane: HOLDS' index.html

          grep -q 'AL_COURTS_REPLAY_PROTOCOL_V0_1.md' index.html
          grep -q '2d050d623ab4a9ba7aff8547dc4f64d28b2f4c27' index.html

          echo "verify passed: ALMS replay runway holds"

  validate-goblin-index:
    name: validate goblin precedent index
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pytest jsonschema

      - name: Validate schema loads
        run: |
          python -c "import json, jsonschema; schema=json.load(open('schemas/goblin_precedent_index.v0_1.schema.json')); print('Schema OK')"

      - name: Run Goblin Precedent Index tests
        run: pytest tests/test_goblin_precedent_index_v0_1.py -v

      - name: Check authority false in index
        run: |
          grep -q "Authority: false" docs/GOBLIN_PRECEDENT_INDEX_V0_1.md || grep -q "authority: false" docs/GOBLIN_PRECEDENT_INDEX_V0_1.md || (echo "authority false missing" && exit 1)
          echo "Authority check passed"

      - name: Check Trinity present
        run: |
          grep -q "PROTECT | WITNESS | APPEND_ONLY" docs/GOBLIN_PRECEDENT_INDEX_V0_1.md || (echo "Trinity missing" && exit 1)
          echo "Trinity check passed"
