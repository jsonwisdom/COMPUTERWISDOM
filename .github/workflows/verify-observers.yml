name: Verify Federal AI Observers

on:
  push:
    branches: [master, main, anchor]
  pull_request:
    branches: [master, main, anchor]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Verify observer credentials
        run: |
          set -e
          echo "| File | Result |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"

          found=0
          while IFS= read -r file; do
            found=1
            if python3 scripts/verify_observer_vc.py "$file"; then
              echo "| $file | PASS |" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "| $file | FAIL |" >> "$GITHUB_STEP_SUMMARY"
              exit 1
            fi
          done < <(find COMPUTERWISDOM/federal/white-house-ai -name "*.vc.json" -type f)

          if [ "$found" -eq 0 ]; then
            echo "| none | FAIL: no VC files found |" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
