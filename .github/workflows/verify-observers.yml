name: Verify Federal AI Observers

on:
  push:
    branches: [master, main, anchor]
  pull_request:
    branches: [master, main, anchor]

permissions:
  contents: read
  actions: read
  id-token: write
  attestations: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Validate registry JSON
        run: |
          set -euo pipefail
          python -m json.tool COMPUTERWISDOM/federal/white-house-ai/JAYWISDOM_MCP_REGISTRY_V1.json >/dev/null
          echo "Registry JSON is valid." >> "$GITHUB_STEP_SUMMARY"

      - name: Verify observer credentials
        run: |
          set -euo pipefail
          echo "| VC File | Result |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"

          found=0
          while IFS= read -r file; do
            found=1
            if python3 scripts/verify_observer_vc.py "$file"; then
              echo "| $file | PASS |" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "| $file | FAIL |" >> "$GITHUB_STEP_SUMMARY"
              exit 1
            fi
          done < <(find COMPUTERWISDOM/federal/white-house-ai -name "*.vc.json" -type f)

          if [ "$found" -eq 0 ]; then
            echo "| none | FAIL: no VC files found |" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

      - name: Enforce federal observer membrane
        run: |
          set -euo pipefail
          python3 scripts/verify_federal_observer_membrane.py .
          echo "Federal observer membrane verified." >> "$GITHUB_STEP_SUMMARY"

      - name: Generate CI badge artifact
        if: success()
        run: |
          set -euo pipefail
          mkdir -p .ci-badges
          cat > .ci-badges/federal-ai-observer-ci.json <<EOF
          {
            "badge": "Federal AI Observer Registry",
            "generated_by": "verify-observers.yml",
            "commit": "${GITHUB_SHA}",
            "status": "CI_VERIFIED",
            "authority": "NONE",
            "claim_boundary": "PROCESS_VERIFIED_NOT_GOVERNMENT_AUTHORITY"
          }
          EOF

      - name: Attest CI badge artifact provenance
        if: success()
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: .ci-badges/federal-ai-observer-ci.json

      - name: Upload CI badge artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: federal-ai-observer-ci-badge
          path: .ci-badges/federal-ai-observer-ci.json
