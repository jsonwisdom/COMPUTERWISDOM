name: watch-trigger-engine-v0-1

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install jsonschema pytest

      - name: Run trigger evaluator unit tests
        run: PYTHONPATH=. pytest tests/test_trigger_evaluator_v0_1.py

      - name: Run watch receipt schema tests
        run: PYTHONPATH=. pytest tests/test_watch_receipt_schema_v0_1.py

      - name: Run evaluator receipt integration tests
        run: PYTHONPATH=. pytest tests/test_trigger_evaluator_receipt_integration_v0_1.py

      - name: Run trigger schema tests
        run: PYTHONPATH=. pytest tests/test_trigger_schema_v0_1.py
