name: Archive Heavy Assets

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Type ARCHIVE to confirm reversible tree-level asset move"
        required: true
        default: "DRY_RUN"

permissions:
  contents: write

jobs:
  archive:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Verify mode
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event.inputs.mode }}" != "ARCHIVE" ]; then
            echo "Mode is not ARCHIVE. Dry run only."
            exit 0
          fi

      - name: Move heavy assets into _archive_assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p _archive_assets

          move_path() {
            src="$1"
            dest="$2"
            if [ -e "$src" ]; then
              mkdir -p "$(dirname "$dest")"
              git mv "$src" "$dest"
              echo "moved $src -> $dest"
            fi
          }

          move_path "Cards" "_archive_assets/Cards"
          move_path "cards" "_archive_assets/cards_lower"
          move_path "Trigger_Deck" "_archive_assets/Trigger_Deck"

          shopt -s nullglob nocaseglob
          for f in *.png *.PNG *.zip *.pdf; do
            [ -f "$f" ] || continue
            git mv "$f" "_archive_assets/$f"
            echo "moved $f -> _archive_assets/$f"
          done
          shopt -u nullglob nocaseglob

          if [ -f .gitignore ]; then
            if ! grep -qxF "_archive_assets/" .gitignore; then
              {
                echo ""
                echo "# Archived heavy assets — do not edit directly"
                echo "_archive_assets/"
              } >> .gitignore
            fi
          else
            {
              echo "# Archived heavy assets — do not edit directly"
              echo "_archive_assets/"
            } > .gitignore
          fi

      - name: Report size after move
        shell: bash
        run: |
          set -euo pipefail
          echo "=== size after move ==="
          du -sh . || true
          echo "=== archive size ==="
          du -sh _archive_assets || true
          echo "=== git status ==="
          git status --short

      - name: Commit reversible archive move
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No archive changes to commit."
          else
            git commit -m "chore: move heavy assets to _archive_assets"
            git push
          fi
