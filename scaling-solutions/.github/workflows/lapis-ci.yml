name: Lapis CI

on:
  push:
    paths:
      - 'scaling-solutions/**'
  pull_request:
    paths:
      - 'scaling-solutions/**'

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install pynacl cryptography google-cloud-kms

      - name: Run verifier
        run: |
          cd scaling-solutions
          chmod +x verify.sh
          ./verify.sh
