[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
cache_path = "cache"

# See more config options https://github.com/foundry-rs/foundry/tree/master/config

[profile.default.model_checker]
contracts = { "src/Config.sol" = ["Config"], "src/ReputationRegistry.sol" = ["ReputationRegistry"], "src/RootNotary.sol" = ["RootNotary"] }

[rpc_endpoints]
base = "https://mainnet.base.org"
ethereum = "https://eth.llamarpc.com"