version: '3.8'

services:
  base-fork:
    image: ghcr.io/foundry-rs/foundry:latest
    ports:
      - "8545:8545"
    command: >
      anvil 
      --host 0.0.0.0 
      --port 8545 
      --chain-id 8453
      --fork-url https://mainnet.base.org
      --fork-block-number 10000000
    networks:
      - reputation-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8545"]
      interval: 30s
      timeout: 10s
      retries: 3

  eth-fork:
    image: ghcr.io/foundry-rs/foundry:latest
    ports:
      - "9545:8545"
    command: >
      anvil 
      --host 0.0.0.0 
      --port 8545 
      --chain-id 1
      --fork-url https://eth.llamarpc.com
      --fork-block-number 19000000
    networks:
      - reputation-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8545"]
      interval: 30s
      timeout: 10s
      retries: 3

  gateway:
    build:
      context: ../packages/gateway
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - ETHEREUM_RPC_URL=http://eth-fork:8545
      - BASE_RPC_URL=http://base-fork:8545
      - REPUTATION_REGISTRY_ADDRESS=${REPUTATION_REGISTRY_ADDRESS:-0x0000000000000000000000000000000000000000}
      - ROOT_NOTARY_ADDRESS=${ROOT_NOTARY_ADDRESS:-0x0000000000000000000000000000000000000000}
    depends_on:
      base-fork:
        condition: service_healthy
      eth-fork:
        condition: service_healthy
    networks:
      - reputation-network

  ipfs:
    image: ipfs/go-ipfs:latest
    ports:
      - "4001:4001"
      - "5001:5001"
      - "8080:8080"
    volumes:
      - ipfs-data:/data/ipfs
    networks:
      - reputation-network

networks:
  reputation-network:
    driver: bridge

volumes:
  ipfs-data: